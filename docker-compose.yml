services:
  # 1. Ollama LLM Container
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && tail -f /dev/null" ]
    # Uncomment the lines below if your Mac has an Apple Silicon chip (M1/M2/M3/M4)
    # and you want to ensure native GPU acceleration inside the container:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: apple
    #           count: 1
    #           capabilities: [gpu]

  # 2. Your Spring Boot App Container
  hookes-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hookes-ai-app
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      # CRITICAL: Instruct Spring AI to talk to the Ollama container instead of localhost
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      # Specify which model you plan to pull and use (e.g., llama3, mistral, phi3)
      - SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL=llama3.2
    # Keeps the app container running and gives Ollama time to initialize
    restart: on-failure

volumes:
  ollama_storage:
    driver: local