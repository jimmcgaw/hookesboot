<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="mainLayout(title, content, footer)">
<head>
    <meta charset="UTF-8">
    <title th:replace="${title}">Master Title</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header, footer { background: #333; color: white; padding: 15px; text-align: center; }
        main { flex: 1; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <h2>🤖 My Spring AI Dashboard</h2>
    </header>

    <main th:replace="${content}">
        <p>Default layout content placeholder</p>
    </main>

    <footer th:if="${footer}" th:replace="${footer}">
        <p>&copy; 2026 HookesBoot AI Project</p>
    </footer>

</body>
</html>
